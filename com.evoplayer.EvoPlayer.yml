app-id: com.evoplayer.EvoPlayer
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: EvoPlayer

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --share=network

modules:
  - name: EvoPlayer
    buildsystem: simple
    build-commands:
      - install -Dm755 build/EvoPlayer /app/bin/EvoPlayer
      - install -Dm644 assets/evoplayer.png /app/share/icons/hicolor/256x256/apps/com.evoplayer.EvoPlayer.png
      - install -Dm644 com.evoplayer.EvoPlayer.desktop /app/share/applications/com.evoplayer.EvoPlayer.desktop
    sources:
      - type: dir
        path: .
